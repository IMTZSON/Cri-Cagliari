<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Redazione - CRI Cagliari</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* --- TEMA PERSONALIZZATO CROCE ROSSA --- */
      
      /* 1. Font generale */
      body, button, input, select, textarea {
        font-family: 'Inter', sans-serif !important;
      }

      /* 2. Barra in alto rossa */
      header[class*="AppHeader-appHeader"] { 
        background-color: #ED1B24 !important; 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      /* 3. Bottoni primari (Login, Pubblica, Salva) */
      button[class*="Button-button-default-default-sizeMedium"],
      button[class*="Button-button-primary"] {
        background-color: #ED1B24 !important;
        color: white !important;
        border-radius: 8px !important;
        transition: all 0.2s ease;
      }
      button[class*="Button-button-primary"]:hover {
        background-color: #c81017 !important;
        transform: translateY(-1px);
      }

      /* 4. Colore dei link nel menu laterale */
      a[class*="SidebarLink-active"] {
        color: #ED1B24 !important;
        border-left-color: #ED1B24 !important;
        background-color: #fef2f2 !important; /* Sfondo rossino chiaro */
      }
      a[class*="SidebarLink"]:hover {
        color: #ED1B24 !important;
      }

      /* 5. Miglioramento dell'editor di testo */
      [data-slate-editor] { 
        padding: 1.5rem !important; 
        font-size: 16px;
        line-height: 1.6;
        color: #1f2937;
      }
      
      /* 6. Finestra di Login Netlify più elegante */
      #netlify-identity-widget {
        font-family: 'Inter', sans-serif !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
