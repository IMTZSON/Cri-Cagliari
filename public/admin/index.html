<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redazione ZARRA - CRI Cagliari</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    
    <style>
      /* --- TEMA TAMARRO EDITION --- */
      
      /* 1. Sfondo animato strobo */
      body {
        background: linear-gradient(45deg, #ff00cc, #333399, #00ffcc, #ffff00) !important;
        background-size: 400% 400% !important;
        animation: gradientZarro 5s ease infinite !important;
        font-family: 'Comic Neue', cursive !important;
      }

      @keyframes gradientZarro {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* 2. Barra in alto fluo con bordo lime */
      header[class*="AppHeader-appHeader"] { 
        background: linear-gradient(90deg, #ff00ff, #00ffff) !important;
        border-bottom: 5px solid #39ff14 !important; /* Verde fluo */
        box-shadow: 0 10px 20px rgba(57, 255, 20, 0.5) !important;
      }

      /* 3. Bottoni stile Fast & Furious */
      button[class*="Button-button-default-default-sizeMedium"],
      button[class*="Button-button-primary"] {
        background-color: #ff0055 !important;
        color: #39ff14 !important;
        font-family: 'Bangers', cursive !important;
        font-size: 22px !important;
        letter-spacing: 2px !important;
        border: 3px solid #39ff14 !important;
        border-radius: 0px !important;
        box-shadow: 0 0 15px #ff0055 !important;
        text-transform: uppercase !important;
        transition: all 0.1s ease !important;
      }
      
      /* Quando passi col mouse il bottone impazzisce */
      button[class*="Button-button-primary"]:hover {
        transform: scale(1.15) rotate(3deg) !important;
        background-color: #39ff14 !important;
        color: #ff0055 !important;
        border-color: #ff0055 !important;
        box-shadow: 0 0 30px #39ff14 !important;
      }

      /* 4. Menu laterale psichedelico */
      a[class*="SidebarLink"] {
        font-weight: bold !important;
        font-size: 18px !important;
        text-shadow: 1px 1px 2px magenta !important;
      }
      a[class*="SidebarLink-active"] {
        color: #39ff14 !important;
        background-color: black !important; 
        border-left: 10px solid #ff00ff !important;
      }

      /* 5. Finestra dell'editor (per farti comunque leggere qualcosa) */
      [data-slate-editor] { 
        background-color: rgba(255, 255, 255, 0.9) !important;
        border: 3px dashed magenta !important;
        padding: 1.5rem !important; 
        font-size: 18px;
        color: #000 !important;
      }
      
      /* 6. Trucchetto per il login: filtri pazzi sul widget */
      #netlify-identity-widget {
        filter: hue-rotate(90deg) drop-shadow(0 0 20px #39ff14);
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
